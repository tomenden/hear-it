name: HearIt
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  HearIt:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    dependencies:
      - package: PostHog
        product: PostHog
      - package: Sentry
        product: Sentry
      - package: Supabase
        product: Auth
      - package: Supabase
        product: Supabase
    sources:
      - path: HearIt
        excludes:
          - Resources
          - Support/Info.plist
      - path: HearIt/Resources
        buildPhase: resources
        excludes:
          - VoicePreviews
      - path: HearIt/Resources/VoicePreviews
        buildPhase: resources
        type: folder
    info:
      path: HearIt/Support/Info.plist
      properties:
        UILaunchScreen: {}
        SentryDSN: "$(SENTRY_DSN)"
        POSTHOG_API_KEY: "$(POSTHOG_API_KEY)"
        POSTHOG_HOST: "$(POSTHOG_HOST)"
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
    settings:
      base:
        SENTRY_DSN: "https://92e80dd7e7b8779e974032e4af6370ac@o4511049880436736.ingest.de.sentry.io/4511049897803856"
        POSTHOG_API_KEY: "phc_WoekR63Pb8KvZpmu3nlrCEbfsYZ0ePuFKvsgakj4dym"
        POSTHOG_HOST: "https://eu.i.posthog.com"
        SUPABASE_URL: "https://YOUR_PROJECT.supabase.co"
        SUPABASE_ANON_KEY: "YOUR_ANON_KEY"
        PRODUCT_BUNDLE_IDENTIFIER: com.tome.hearit
        PRODUCT_NAME: HearIt
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - HearItTests
  HearItTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: HearItTests
    dependencies:
      - target: HearIt
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tome.hearit.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HearIt.app/HearIt"
        BUNDLE_LOADER: "$(TEST_HOST)"
