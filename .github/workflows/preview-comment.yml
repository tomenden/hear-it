name: Preview URL Comment

# Manually fetch the Render preview URL for a branch and post it as a PR comment.
# Trigger from the Actions tab or via: gh workflow run preview-comment.yml --ref <branch>

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to look up (defaults to the branch this runs on)"
        required: false
        default: ""
      pr_number:
        description: "PR number to comment on (required to post a comment)"
        required: false
        default: ""

jobs:
  post-preview-url:
    name: Post Render preview URL
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Fetch Render preview URL
        id: render-url
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [[ -z "$BRANCH" ]]; then
            BRANCH="${{ github.ref_name }}"
          fi
          SERVICE_NAME="hear-it-api"
          API="https://api.render.com/v1"

          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            "$API/services?limit=100" || echo "")

          URL=$(echo "$RESPONSE" | jq -r --arg name "$SERVICE_NAME" --arg branch "$BRANCH" \
            '[.[] | select(
                (.service.name | startswith($name)) and
                .service.type == "web_service" and
                (.service.repo.branch // "" | test($branch; "i"))
              )][0].service.serviceDetails.url // empty' 2>/dev/null || echo "")

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Branch: $BRANCH → URL: ${URL:-<not found>}"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const renderUrl = '${{ steps.render-url.outputs.url }}';
            const branch = '${{ github.event.inputs.branch }}' || '${{ github.ref_name }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/ios-preview.yml`;

            let body;
            if (renderUrl) {
              body = [
                '## Preview environments',
                '',
                `| | |`,
                `|---|---|`,
                `| **Backend (Render)** | [\`${renderUrl}\`](${renderUrl}) |`,
                `| **iOS build** | [Trigger a build →](${runUrl}) *(uses workflow dispatch, select branch \`${branch}\`)* |`,
                '',
                '> The iOS build will be distributed via Firebase App Distribution.',
                '> You will receive an install link on your phone.',
              ].join('\n');
            } else {
              body = [
                '## Preview environments',
                '',
                '⚠️ Render preview URL not yet available. It may still be deploying.',
                `Check the [Render dashboard](https://dashboard.render.com) or re-run this workflow once the deploy completes.`,
              ].join('\n');
            }

            const prNumber = parseInt('${{ github.event.inputs.pr_number }}');
            if (!prNumber) {
              console.log('No PR number provided — printing URL to log only.');
              console.log(body);
              return;
            }

            // Upsert: update existing comment if present, otherwise create one
            const marker = '## Preview environments';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
